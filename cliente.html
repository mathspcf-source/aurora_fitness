<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aurora • Minhas Fichas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}body{background:#0a0a0a;height:100vh;overflow:hidden}.login-screen{position:fixed;top:0;left:0;width:100%;height:100vh;background:linear-gradient(145deg,#0d0d0d 0%,#1a1a1a 100%);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}.login-screen.hidden{display:none}.login-box{background:#141414;border:1px solid #2a2a2a;border-radius:24px;padding:32px 24px;width:100%;max-width:360px}.login-logo{text-align:center;margin-bottom:28px}.login-logo i{font-size:2.5rem;color:#ff6b35}.login-logo h1{font-size:1.8rem;font-weight:700;color:#fff}.login-logo span{background:linear-gradient(135deg,#ff6b35,#ff8c42);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.login-badge{background:linear-gradient(135deg,#ff6b35,#e85d04);padding:5px 16px;border-radius:30px;font-size:0.7rem;font-weight:700;color:#fff;display:inline-block;margin-top:12px}.input-group{margin-bottom:16px}.input-group label{display:block;color:#aaa;margin-bottom:6px}.input-field{position:relative}.input-field i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#ff6b35}.input-field input{width:100%;padding:14px 14px 14px 44px;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:14px;color:#fff}.btn-login{width:100%;padding:16px;background:linear-gradient(135deg,#ff6b35,#e85d04);border:none;border-radius:14px;color:#fff;font-weight:600;cursor:pointer}.main-panel{display:none;height:100vh;background:#0a0a0a;overflow:hidden;flex-direction:column}.main-panel.active{display:flex}.header{background:#0d0d0d;padding:16px 20px;border-bottom:1px solid #1a1a1a;display:flex;align-items:center;justify-content:space-between}.header h1{font-size:1.3rem;font-weight:700;color:#fff}.profile-badge{display:flex;align-items:center;gap:8px;background:#111;padding:6px 14px;border-radius:30px;border:1px solid #1a1a1a}.profile-badge i{color:#ff6b35}.profile-badge span{color:#fff;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.logout-btn{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:#ef4444;padding:8px 14px;border-radius:30px;cursor:pointer}.content{flex:1;overflow-y:auto;padding:16px}.sheet-grid{display:grid;gap:12px}.sheet-card{background:#111;border:1px solid #1a1a1a;border-radius:16px;padding:16px;cursor:pointer}.sheet-card:active{background:#161616}.sheet-card h3{color:#fff;margin-bottom:4px}.sheet-card p{color:#ff6b35;font-size:0.8rem}.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:2000;align-items:flex-end}.modal.active{display:flex}.modal-content{background:#111;border:1px solid #2a2a2a;border-radius:20px 20px 0 0;padding:24px 20px;width:100%;max-height:80vh;overflow-y:auto}.modal-header{display:flex;justify-content:space-between;margin-bottom:20px}.modal-header h3{color:#fff}.close-modal{color:#888;font-size:1.5rem;cursor:pointer}.exercise-item{background:#161616;border-radius:12px;padding:14px;margin-bottom:10px}.exercise-name{color:#ff6b35;font-weight:600;margin-bottom:10px}.exercise-details{display:grid;grid-template-columns:1fr 1fr;gap:8px}.exercise-detail{background:#111;padding:8px;border-radius:8px;text-align:center}.exercise-detail small{color:#888;font-size:0.65rem}.exercise-detail strong{color:#fff}.btn-primary{background:linear-gradient(135deg,#ff6b35,#e85d04);color:#fff;border:none;padding:14px;border-radius:12px;font-weight:600;cursor:pointer}.empty-state{text-align:center;padding:60px 20px;color:#888}.empty-state i{font-size:4rem;color:#ff6b35;margin-bottom:16px;opacity:0.3}
    </style>
</head>
<body>
    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <div class="login-logo"><i class="fas fa-dumbbell"></i><h1>Aurora<span>.</span></h1><p style="color:#aaa">Fitness</p><div class="login-badge"><i class="fas fa-user"></i> CLIENTE</div></div>
            <form id="loginForm">
                <div class="input-group"><label>Email</label><div class="input-field"><i class="fas fa-envelope"></i><input type="email" id="clientEmail" placeholder="Seu email"></div></div>
                <div class="input-group"><label>Senha</label><div class="input-field"><i class="fas fa-lock"></i><input type="password" id="clientPassword" placeholder="••••••••"></div></div>
                <div class="error-message" id="loginError" style="color:#ef4444;text-align:center;display:none"></div>
                <button type="submit" class="btn-login">Acessar</button>
            </form>
        </div>
    </div>

    <div class="modal" id="sheetModal">
        <div class="modal-content">
            <div class="modal-header"><h3 id="sheetModalTitle">Ficha</h3><i class="fas fa-times close-modal" onclick="closeSheetModal()"></i></div>
            <div id="sheetDetailContent"></div>
            <button class="btn-primary" onclick="closeSheetModal()" style="width:100%;margin-top:20px">Fechar</button>
        </div>
    </div>

    <div class="main-panel" id="mainPanel">
        <div class="header">
            <h1>Aurora<span>.</span></h1>
            <div style="display:flex;gap:8px">
                <div class="profile-badge"><i class="fas fa-user-circle"></i><span id="clientNameDisplay">Cliente</span></div>
                <div class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i></div>
            </div>
        </div>
        <div class="content"><div id="clientSheetsList"></div></div>
    </div>

    <script>
        let clients = JSON.parse(localStorage.getItem('pt_clients')) || [];
        let sheets = JSON.parse(localStorage.getItem('pt_sheets')) || [];
        let currentClient = null;

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('clientEmail').value.trim();
            const pwd = document.getElementById('clientPassword').value;
            const client = clients.find(c => c.email === email && c.password === pwd);
            if (client) {
                currentClient = client;
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('mainPanel').classList.add('active');
                document.getElementById('clientNameDisplay').textContent = client.name.split(' ')[0];
                renderSheets();
            } else { document.getElementById('loginError').style.display = 'block'; }
        });

        function logout() { currentClient = null; document.getElementById('loginScreen').classList.remove('hidden'); document.getElementById('mainPanel').classList.remove('active'); }

        function renderSheets() {
            const clientSheets = sheets.filter(s => s.clientId === currentClient.id);
            const c = document.getElementById('clientSheetsList');
            if (!clientSheets.length) { c.innerHTML = '<div class="empty-state"><i class="fas fa-clipboard-list"></i><p>Nenhuma ficha</p><small>Seu personal ainda não criou fichas para você</small></div>'; return; }
            c.innerHTML = `<div class="sheet-grid">${clientSheets.map(sheet => `<div class="sheet-card" onclick="openSheetModal('${sheet.id}')"><h3>${sheet.name}</h3><p>${sheet.exercises.length} exercícios</p><small>${sheet.createdAt}</small></div>`).join('')}</div>`;
        }

        function openSheetModal(sheetId) {
            const sheet = sheets.find(s => s.id == sheetId); if (!sheet) return;
            document.getElementById('sheetModalTitle').textContent = sheet.name;
            document.getElementById('sheetDetailContent').innerHTML = `${sheet.notes ? `<p style="color:#aaa;margin-bottom:16px">📝 ${sheet.notes}</p>` : ''}${sheet.exercises.map((ex, i) => `<div class="exercise-item"><div class="exercise-name">${i+1}. ${ex.name}</div><div class="exercise-details"><div class="exercise-detail"><small>Séries</small><strong>${ex.series}</strong></div><div class="exercise-detail"><small>Reps</small><strong>${ex.reps}</strong></div><div class="exercise-detail"><small>Carga</small><strong>${ex.load || '-'}</strong></div><div class="exercise-detail"><small>Obs</small><strong>${ex.notes || '-'}</strong></div></div></div>`).join('')}`;
            document.getElementById('sheetModal').classList.add('active');
        }

        function closeSheetModal() { document.getElementById('sheetModal').classList.remove('active'); }
    </script>
</body>
</html>
