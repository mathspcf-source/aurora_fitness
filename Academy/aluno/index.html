<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Aurora Fitness • Painel do Aluno</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
        body{background:#0a0e27;height:100vh;overflow:hidden}
        
        .login-screen{position:fixed;top:0;left:0;width:100%;height:100vh;background:linear-gradient(135deg,#0a0e27 0%,#1a1f4e 100%);display:flex;align-items:center;justify-content:center;z-index:1000}
        .login-screen.hidden{display:none}
        .login-box{background:rgba(255,255,255,0.03);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.08);border-radius:24px;padding:40px 36px;width:100%;max-width:400px}
        .login-logo{text-align:center;margin-bottom:32px}
        .login-logo i{font-size:2.8rem;color:#10b981}
        .login-logo h1{font-size:2rem;font-weight:700;color:white;margin-top:10px}
        .login-logo h1 span{background:linear-gradient(135deg,#10b981,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .login-badge{background:linear-gradient(135deg,#10b981,#059669);padding:5px 16px;border-radius:30px;font-size:0.7rem;font-weight:700;color:white;display:inline-block;margin-top:12px}
        .input-group{margin-bottom:20px}
        .input-group label{display:block;color:#cbd5e0;margin-bottom:6px}
        .input-field{position:relative}
        .input-field i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:white}
        .input-field input{width:100%;padding:12px 12px 12px 42px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:12px;color:white}
        .btn-login{width:100%;padding:13px;background:linear-gradient(135deg,#10b981,#059669);border:none;border-radius:12px;color:white;font-weight:600;cursor:pointer;margin-top:8px}
        .error-message{color:#ef4444;text-align:center;margin-top:12px;font-size:0.8rem;display:none}
        
        .main-panel{display:none;height:100vh;background:#0a0e27;overflow:hidden}
        .main-panel.active{display:flex}
        .sidebar{width:260px;background:linear-gradient(180deg,#0f1433 0%,#0a0e27 100%);border-right:1px solid rgba(255,255,255,0.04);padding:24px 0;height:100vh;overflow-y:auto}
        .sidebar-logo{padding:0 18px 24px 24px;border-bottom:1px solid rgba(16,185,129,0.15);margin-bottom:24px}
        .sidebar-logo h2{font-size:1.5rem;font-weight:700;color:white}
        .sidebar-logo span{background:linear-gradient(135deg,#10b981,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .student-info{margin-top:6px;color:#a0aec0;font-size:0.8rem}
        .nav-menu{flex:1;padding:0 14px}
        .nav-item{display:flex;align-items:center;gap:12px;padding:11px 16px;margin:2px 0;border-radius:12px;color:#a0aec0;cursor:pointer}
        .nav-item i{width:22px}
        .nav-item:hover{background:rgba(16,185,129,0.1);color:white}
        .nav-item.active{background:linear-gradient(135deg,#10b981,#059669);color:white}
        .logout-btn{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);color:#f87171;padding:8px 18px;border-radius:12px;cursor:pointer;margin:20px 14px}
        
        .content-area{flex:1;padding:24px 32px;overflow-y:auto}
        .top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px}
        .page-title h1{font-size:1.8rem;font-weight:700;color:white}
        .profile-info{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.03);padding:6px 18px 6px 12px;border-radius:40px}
        .profile-info i{color:#10b981}
        .profile-info span{color:white}
        
        .sheet-card{background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.04);border-radius:18px;padding:24px;margin-bottom:20px}
        .sheet-header{display:flex;justify-content:space-between;margin-bottom:20px}
        .sheet-title{color:white;font-size:1.3rem}
        .exercise-item{background:rgba(255,255,255,0.03);border-radius:12px;padding:16px;margin-bottom:12px}
        .exercise-name{color:#10b981;font-weight:600;margin-bottom:8px}
        .exercise-details{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;color:#cbd5e0}
        
        .empty-state{text-align:center;padding:40px;color:#a0aec0}
        .copyright{text-align:center;margin-top:32px;padding-top:20px;border-top:1px solid rgba(255,255,255,0.04);color:#8892b0;font-size:0.8rem}
    </style>
</head>
<body>
    <!-- TELA DE LOGIN -->
    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <div class="login-logo">
                <i class="fas fa-dumbbell"></i>
                <h1>Aurora<span>.</span></h1>
                <p>Fitness</p>
                <div class="login-badge"><i class="fas fa-user"></i> PAINEL DO ALUNO</div>
            </div>
            <form id="loginForm">
                <div class="input-group"><label>ID da Academia</label><div class="input-field"><i class="fas fa-building"></i><input type="text" id="academyId" placeholder="Ex: ACAD001" required></div></div>
                <div class="input-group"><label>Matrícula</label><div class="input-field"><i class="fas fa-id-card"></i><input type="text" id="studentRegistration" placeholder="Sua matrícula" required></div></div>
                <div class="input-group"><label>Senha</label><div class="input-field"><i class="fas fa-lock"></i><input type="password" id="studentPassword" placeholder="••••••••" required></div></div>
                <div class="error-message" id="loginError"></div>
                <button type="submit" class="btn-login"><i class="fas fa-sign-in-alt"></i> Acessar</button>
            </form>
            <div class="creator-info" style="text-align:center;margin-top:24px;color:#8892b0;font-size:0.75rem">© 2026 Aurora Fitness</div>
        </div>
    </div>

    <!-- PAINEL PRINCIPAL -->
    <div class="main-panel" id="mainPanel">
        <div class="sidebar">
            <div class="sidebar-logo"><h2>Aurora<span>.</span></h2><div class="student-info" id="sidebarStudentName">Aluno</div></div>
            <div class="nav-menu">
                <div class="nav-item active" data-page="sheets"><i class="fas fa-clipboard-list"></i> Minhas Fichas</div>
                <div class="nav-item" data-page="profile"><i class="fas fa-user"></i> Meu Perfil</div>
            </div>
            <div class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Sair</div>
        </div>

        <div class="content-area">
            <div class="top-bar">
                <div class="page-title"><h1 id="pageTitle">Minhas Fichas</h1></div>
                <div class="profile-info"><i class="fas fa-user-circle"></i><span id="studentNameDisplay">Aluno</span></div>
            </div>

            <div class="page active" id="sheets">
                <div id="studentSheetsList"></div>
            </div>

            <div class="page" id="profile">
                <h2 style="color:white;margin-bottom:24px">Meu Perfil</h2>
                <div id="profileInfo" style="color:white"></div>
            </div>

            <div class="copyright">© 2026 Aurora Fitness • Matheus Pacifico | (79) 99645-8399</div>
        </div>
    </div>

    <script>
        const ACADEMIES = [{ id: 'ACAD001', password: '123456', name: 'Academia Exemplo' }];
        let currentStudent = null;
        let students = JSON.parse(localStorage.getItem('aurora_fitness_students')) || [];
        let sheets = JSON.parse(localStorage.getItem('aurora_fitness_sheets')) || [];

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const academyId = document.getElementById('academyId').value.toUpperCase().trim();
            const registration = document.getElementById('studentRegistration').value.trim();
            const password = document.getElementById('studentPassword').value;
            
            const academy = ACADEMIES.find(a => a.id === academyId);
            if (!academy) { document.getElementById('loginError').style.display = 'block'; return; }
            
            const student = students.find(s => s.registration === registration && s.password === password);
            if (student) {
                currentStudent = student;
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('mainPanel').classList.add('active');
                initializePanel();
            } else {
                document.getElementById('loginError').style.display = 'block';
            }
        });

        function logout() { currentStudent = null; document.getElementById('loginScreen').classList.remove('hidden'); document.getElementById('mainPanel').classList.remove('active'); }

        function initializePanel() {
            document.getElementById('sidebarStudentName').textContent = currentStudent.name;
            document.getElementById('studentNameDisplay').textContent = currentStudent.name;
            renderSheets();
        }

        document.querySelectorAll('.nav-item').forEach(item => { item.addEventListener('click', function() {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); this.classList.add('active');
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(this.dataset.page).classList.add('active');
            document.getElementById('pageTitle').textContent = this.dataset.page === 'sheets' ? 'Minhas Fichas' : 'Meu Perfil';
            if (this.dataset.page === 'profile') renderProfile();
        });});

        function renderSheets() {
            const studentSheets = sheets.filter(s => s.studentId === currentStudent.id);
            const c = document.getElementById('studentSheetsList');
            if (!studentSheets.length) { c.innerHTML = '<div class="empty-state"><i class="fas fa-clipboard-list" style="font-size:3rem;opacity:0.4"></i><p>Nenhuma ficha de treino</p></div>'; return; }
            c.innerHTML = studentSheets.map(sheet => `
                <div class="sheet-card">
                    <div class="sheet-header"><div class="sheet-title">${sheet.name}</div><div style="color:#8892b0">${sheet.createdAt}</div></div>
                    ${sheet.notes ? `<p style="color:#a0aec0;margin-bottom:16px"><i class="fas fa-info-circle"></i> ${sheet.notes}</p>` : ''}
                    ${sheet.exercises.map((ex, i) => `
                        <div class="exercise-item">
                            <div class="exercise-name">${i+1}. ${ex.name || 'Exercício'}</div>
                            <div class="exercise-details"><div><i class="fas fa-layer-group"></i> ${ex.series} séries</div><div><i class="fas fa-redo-alt"></i> ${ex.reps} reps</div><div><i class="fas fa-weight-hanging"></i> ${ex.load || '-'}</div><div><i class="fas fa-sticky-note"></i> ${ex.notes || '-'}</div></div>
                        </div>
                    `).join('')}
                </div>
            `).join('');
        }

        function renderProfile() {
            document.getElementById('profileInfo').innerHTML = `
                <div style="background:rgba(255,255,255,0.03);padding:24px;border-radius:16px">
                    <p><strong>Nome:</strong> ${currentStudent.name}</p>
                    <p><strong>Matrícula:</strong> ${currentStudent.registration}</p>
                    <p><strong>Telefone:</strong> ${currentStudent.phone || '-'}</p>
                    <p><strong>E-mail:</strong> ${currentStudent.email || '-'}</p>
                    <p><strong>Data de Nascimento:</strong> ${currentStudent.birth || '-'}</p>
                </div>
            `;
        }
    </script>
</body>
</html>
