<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Aurora Fitness • Aluno</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}body{background:#0a0a0a;height:100vh;overflow:hidden}.login-screen{position:fixed;top:0;left:0;width:100%;height:100vh;background:linear-gradient(145deg,#0d0d0d 0%,#1a1a1a 100%);display:flex;align-items:center;justify-content:center;z-index:1000}.login-screen.hidden{display:none}.login-box{background:#141414;border:1px solid #2a2a2a;border-radius:24px;padding:40px;width:100%;max-width:380px}.login-logo{text-align:center;margin-bottom:32px}.login-logo i{font-size:2.8rem;color:#ff6b35}.login-logo h1{font-size:2rem;font-weight:700;color:white}.login-logo span{background:linear-gradient(135deg,#ff6b35,#ff8c42);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.login-badge{background:linear-gradient(135deg,#ff6b35,#e85d04);padding:5px 16px;border-radius:30px;font-size:0.7rem;font-weight:700;color:white;display:inline-block;margin-top:12px}.input-group{margin-bottom:18px}.input-group label{display:block;color:#aaa;margin-bottom:6px}.input-field{position:relative}.input-field i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#ff6b35}.input-field input{width:100%;padding:12px 12px 12px 44px;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;color:white}.btn-login{width:100%;padding:14px;background:linear-gradient(135deg,#ff6b35,#e85d04);border:none;border-radius:12px;color:white;font-weight:600;cursor:pointer}.error-message{color:#ef4444;text-align:center;margin-top:12px;display:none}.main-panel{display:none;height:100vh;background:#0a0a0a;overflow:hidden}.main-panel.active{display:flex}.sidebar{width:260px;background:#0d0d0d;border-right:1px solid #1a1a1a;padding:24px 0}.sidebar-logo{padding:0 20px 24px 24px;border-bottom:1px solid #1a1a1a;margin-bottom:24px}.sidebar-logo h2{font-size:1.5rem;font-weight:700;color:white}.student-info{margin-top:6px;color:#888;font-size:0.75rem}.nav-item{display:flex;align-items:center;gap:12px;padding:12px 16px;margin:3px 14px;border-radius:12px;color:#999;cursor:pointer}.nav-item i{width:22px}.nav-item.active{background:linear-gradient(135deg,#ff6b35,#e85d04);color:white}.logout-btn{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:#ef4444;padding:12px 16px;border-radius:12px;cursor:pointer;display:flex;align-items:center;gap:8px;margin:16px 14px}.content-area{flex:1;padding:24px 32px;overflow-y:auto}.content-area::-webkit-scrollbar{width:4px}.content-area::-webkit-scrollbar-thumb{background:#ff6b35;border-radius:10px}.top-bar{display:flex;justify-content:space-between;margin-bottom:24px}.page-title h1{font-size:1.8rem;font-weight:700;color:white}.profile-info{display:flex;align-items:center;gap:10px;background:#111;padding:7px 20px;border-radius:40px;border:1px solid #1a1a1a}.profile-info i{color:#ff6b35}.profile-info span{color:white}.sheet-card{background:#111;border:1px solid #1a1a1a;border-radius:16px;padding:24px;margin-bottom:20px}.sheet-header{display:flex;justify-content:space-between;margin-bottom:16px}.sheet-title{color:white;font-size:1.2rem}.exercise-item{background:#161616;border-radius:12px;padding:16px;margin-bottom:12px}.exercise-name{color:#ff6b35;font-weight:600;margin-bottom:8px}.exercise-details{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;color:#aaa;font-size:0.9rem}.empty-state{text-align:center;padding:40px;color:#888}.copyright{text-align:center;margin-top:32px;padding-top:20px;border-top:1px solid #1a1a1a;color:#888;font-size:0.75rem}
    </style>
</head>
<body>
    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <div class="login-logo"><i class="fas fa-dumbbell"></i><h1>Aurora<span>.</span></h1><p style="color:#aaa;margin-top:4px">Fitness</p><div class="login-badge"><i class="fas fa-user"></i> ALUNO</div></div>
            <form id="loginForm">
                <div class="input-group"><label>Matrícula</label><div class="input-field"><i class="fas fa-id-card"></i><input type="text" id="studentRegistration" placeholder="Sua matrícula"></div></div>
                <div class="input-group"><label>Senha</label><div class="input-field"><i class="fas fa-lock"></i><input type="password" id="studentPassword" placeholder="••••••••"></div></div>
                <div class="error-message" id="loginError"></div>
                <button type="submit" class="btn-login">Acessar</button>
            </form>
        </div>
    </div>

    <div class="main-panel" id="mainPanel">
        <div class="sidebar">
            <div class="sidebar-logo"><h2>Aurora<span>.</span></h2><div class="student-info" id="sidebarStudentName">Aluno</div></div>
            <div class="nav-item active"><i class="fas fa-clipboard-list"></i> Minhas Fichas</div>
            <div class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Sair</div>
        </div>
        <div class="content-area">
            <div class="top-bar"><div class="page-title"><h1>Minhas Fichas</h1></div><div class="profile-info"><i class="fas fa-user-circle"></i><span id="studentNameDisplay">Aluno</span></div></div>
            <div id="studentSheetsList"></div>
            <div class="copyright">© 2026 Aurora Fitness</div>
        </div>
    </div>

    <script>
        let students = JSON.parse(localStorage.getItem('fit_students')) || [];
        let sheets = JSON.parse(localStorage.getItem('fit_sheets')) || [];
        let currentStudent = null;

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const reg = document.getElementById('studentRegistration').value.trim();
            const pwd = document.getElementById('studentPassword').value;
            const student = students.find(s => s.registration === reg && s.password === pwd);
            if (student) {
                currentStudent = student;
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('mainPanel').classList.add('active');
                document.getElementById('sidebarStudentName').textContent = student.name;
                document.getElementById('studentNameDisplay').textContent = student.name;
                renderSheets();
            } else { document.getElementById('loginError').style.display = 'block'; }
        });

        function logout() { currentStudent = null; document.getElementById('loginScreen').classList.remove('hidden'); document.getElementById('mainPanel').classList.remove('active'); }

        function renderSheets() {
            const studentSheets = sheets.filter(s => s.studentId === currentStudent.id);
            const c = document.getElementById('studentSheetsList');
            if (!studentSheets.length) { c.innerHTML = '<div class="empty-state"><i class="fas fa-clipboard-list" style="font-size:3rem;opacity:0.3"></i><p>Nenhuma ficha</p></div>'; return; }
            c.innerHTML = studentSheets.map(sheet => `<div class="sheet-card"><div class="sheet-header"><div class="sheet-title">${sheet.name}</div><div style="color:#888">${sheet.createdAt}</div></div>${sheet.notes?`<p style="color:#aaa;margin-bottom:16px">${sheet.notes}</p>`:''}${sheet.exercises.map((ex,i)=>`<div class="exercise-item"><div class="exercise-name">${i+1}. ${ex.name}</div><div class="exercise-details"><div>${ex.series} séries</div><div>${ex.reps} reps</div><div>${ex.load||'-'}</div><div>${ex.notes||'-'}</div></div></div>`).join('')}</div>`).join('');
        }
    </script>
</body>
</html>
